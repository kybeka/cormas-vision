<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Label Inspector</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1f242d; --line:#2a313c;
    --txt:#e6e9ef; --mut:#8b94a3; --accent:#4c8dff; --good:#22c55e; --warn:#f59e0b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden}
  .app{display:flex;flex-direction:column;height:100vh}
  .top{display:flex;align-items:center;gap:14px;padding:8px 14px;background:var(--panel);
    border-bottom:1px solid var(--line);flex:0 0 auto}
  .top .name{font-weight:600}
  .top .meta{color:var(--mut);font-size:13px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .dot.saved{background:var(--good)} .dot.dirty{background:var(--warn)}
  .spacer{flex:1}
  .btn{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:7px;
    padding:6px 11px;cursor:pointer;font-size:13px}
  .btn:hover{border-color:#3a434f;background:#252b35}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.4;cursor:default}
  kbd{background:#0b0d11;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;
    padding:1px 6px;font:12px ui-monospace,Menlo,monospace;color:var(--mut)}
  .body{display:flex;flex:1;min-height:0}
  .stage{flex:1;position:relative;background:#0a0c10;min-width:0}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:crosshair}
  .hint{position:absolute;left:12px;bottom:10px;color:var(--mut);font-size:12px;
    background:rgba(10,12,16,.7);padding:4px 8px;border-radius:6px;pointer-events:none}
  .side{width:280px;flex:0 0 280px;background:var(--panel);border-left:1px solid var(--line);
    display:flex;flex-direction:column;min-height:0}
  .side h3{margin:0;padding:11px 14px 7px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut)}
  .active-cls{margin:2px 14px 6px;padding:9px 11px;border-radius:8px;background:var(--panel2);
    display:flex;align-items:center;gap:9px;border:1px solid var(--line)}
  .active-cls .sw{width:16px;height:16px;border-radius:4px}
  .active-cls b{font-size:13px}
  .palette{overflow-y:auto;padding:2px 8px 8px;flex:1;min-height:60px}
  .cls{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:7px;cursor:pointer;border:1px solid transparent}
  .cls:hover{background:var(--panel2)}
  .cls.sel{background:#222a36;border-color:var(--accent)}
  .cls .sw{width:14px;height:14px;border-radius:4px;flex:0 0 auto}
  .cls .nm{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cls .k{font:11px ui-monospace,monospace;color:var(--mut);background:#0b0d11;border:1px solid var(--line);
    border-radius:4px;padding:0 5px;min-width:18px;text-align:center}
  .cls .ct{font:12px ui-monospace,monospace;color:var(--mut);min-width:18px;text-align:right}
  .cls .ct.has{color:var(--txt)}
  .tools{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--line)}
  .tools .btn{flex:1;text-align:center}
  .tools .btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .nav{display:flex;gap:6px;padding:0 12px 10px}
  .nav .btn{flex:1;text-align:center}
  .help{padding:8px 14px 14px;border-top:1px solid var(--line);color:var(--mut);font-size:12px}
  .help div{margin:3px 0;display:flex;justify-content:space-between;gap:10px}
  .progress{height:4px;background:var(--panel2)}
  .progress > i{display:block;height:100%;background:var(--accent);width:0;transition:width .2s}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <span class="name" id="fname">—</span>
    <span class="meta" id="counter">0 / 0</span>
    <span class="meta"><span class="dot saved" id="savedot"></span><span id="savetxt">saved</span></span>
    <span class="meta" id="boxcount">0 boxes</span>
    <div class="spacer"></div>
    <span class="meta" id="zoom">100%</span>
    <button class="btn" id="fitBtn" title="Fit (F)">Fit</button>
    <button class="btn" id="prevBtn" title="Previous (A / ←)">‹ Prev</button>
    <button class="btn" id="nextBtn" title="Next (D / →)">Next ›</button>
    <button class="btn primary" id="saveBtn" title="Save (S)">Save</button>
  </div>
  <div class="progress"><i id="progbar"></i></div>
  <div class="body">
    <div class="stage" id="stage">
      <canvas id="cv"></canvas>
      <div class="hint" id="hint"></div>
    </div>
    <div class="side">
      <h3>Active class</h3>
      <div class="active-cls"><span class="sw" id="actSw"></span><b id="actNm">—</b></div>
      <h3>Classes — click or hotkey</h3>
      <div class="palette" id="palette"></div>
      <div class="tools">
        <button class="btn on" id="toolDraw" title="Draw boxes (B)">✎ Draw</button>
        <button class="btn" id="toolSelect" title="Select / move (V)">⬚ Select</button>
      </div>
      <div class="nav">
        <button class="btn" id="undoBtn" title="Undo (⌘/Ctrl+Z)">↶ Undo</button>
        <button class="btn" id="delBtn" title="Delete selected (Del)">🗑 Delete</button>
      </div>
      <div class="help">
        <div><span>Draw box</span><kbd>drag</kbd></div>
        <div><span>Rotate</span><kbd>drag top handle</kbd></div>
        <div><span>Resize</span><kbd>drag corners</kbd></div>
        <div><span>Move</span><kbd>drag body</kbd></div>
        <div><span>Pan / Zoom</span><kbd>space-drag / scroll</kbd></div>
        <div><span>Delete</span><kbd>Del</kbd></div>
        <div><span>Reclass selected</span><kbd>hotkey</kbd></div>
        <div><span>Prev / Next / Save</span><kbd>A / D / S</kbd></div>
      </div>
    </div>
  </div>
</div>
<script>
const ITER = parseInt("__ITERATION__") || 0;
const HOTKEYS = "1234567890qwertyuiop".split("");
const ROT_OFFSET = 24; // screen px for rotation handle stalk
const S = {
  classes:[], colors:[], total:0, idx:0,
  img:null, iw:0, ih:0,
  boxes:[],            // {cls, cx, cy, w, h, angle}  -- all in IMAGE PIXELS, angle radians
  active:0, sel:-1, tool:"draw",
  scale:1, zoom:1, ox:0, oy:0,
  dirty:false, undo:[], drag:null, space:false,
};
const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
const $ = id => document.getElementById(id);
const clamp01 = v => Math.max(0, Math.min(1, v));

/* ---------- geometry ---------- */
function rot(x,y,a){ const c=Math.cos(a), s=Math.sin(a); return {x:x*c-y*s, y:x*s+y*c}; }
function corners(b){ // 4 image-pixel points: TL,TR,BR,BL in the box's local order
  const hw=b.w/2, hh=b.h/2;
  return [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]].map(([lx,ly])=>{
    const r=rot(lx,ly,b.angle); return {x:b.cx+r.x, y:b.cy+r.y};
  });
}
function rotHandle(b){ // image-pixel point above the top edge (offset constant in screen px)
  const d=b.h/2 + ROT_OFFSET/S.scale, r=rot(0,-d,b.angle);
  return {x:b.cx+r.x, y:b.cy+r.y};
}
function inBox(px,py,b){ const r=rot(px-b.cx, py-b.cy, -b.angle);
  return Math.abs(r.x)<=b.w/2 && Math.abs(r.y)<=b.h/2; }

/* points(normalized) <-> box(pixels) */
function toBox(d){
  let pts;
  if(d.type==="polygon"&&d.points) pts=d.points.map(p=>[p[0]*S.iw, p[1]*S.ih]);
  else if(d.type==="bbox"){ const x=d.x_center*S.iw,y=d.y_center*S.ih,w=d.width*S.iw,h=d.height*S.ih;
    pts=[[x-w/2,y-h/2],[x+w/2,y-h/2],[x+w/2,y+h/2],[x-w/2,y+h/2]]; }
  else return null;
  const cx=(pts[0][0]+pts[1][0]+pts[2][0]+pts[3][0])/4, cy=(pts[0][1]+pts[1][1]+pts[2][1]+pts[3][1])/4;
  const w=Math.hypot(pts[1][0]-pts[0][0], pts[1][1]-pts[0][1]);
  const h=Math.hypot(pts[2][0]-pts[1][0], pts[2][1]-pts[1][1]);
  const angle=Math.atan2(pts[1][1]-pts[0][1], pts[1][0]-pts[0][0]);
  return {cls:d.class_id, cx, cy, w:Math.max(w,1), h:Math.max(h,1), angle};
}
function fromBox(b){
  const pts=corners(b).map(p=>[clamp01(p.x/S.iw), clamp01(p.y/S.ih)]);
  return {class_id:b.cls, type:"polygon", points:pts};
}

/* ---------- data ---------- */
async function init(){
  const r = await fetch(`/api/init/${ITER}`).then(r=>r.json());
  if(r.error){ $("fname").textContent = "ERROR: "+r.error; return; }
  S.classes=r.class_names; S.colors=r.class_colors; S.total=r.total_images;
  buildPalette(); setActive(firstPawnOr0());
  window.addEventListener("resize", ()=>{ resize(); draw(); });
  resize(); await load(0);
}
function firstPawnOr0(){ const i=S.classes.findIndex(c=>c.includes("pawn")); return i<0?0:i; }
async function load(i){
  if(i<0||i>=S.total) return;
  if(S.dirty) await save(false);
  S.idx=i;
  const r=await fetch(`/api/image/${i}`).then(r=>r.json());
  const im=new Image();
  im.onload=()=>{ S.img=im; S.iw=im.naturalWidth; S.ih=im.naturalHeight;
    S.boxes=(r.detections||[]).map(toBox).filter(Boolean); S.sel=-1; S.undo=[]; S.dirty=false;
    fit(); draw(); updateUI(); };
  im.src=r.image_data;
  $("fname").textContent=r.filename; $("counter").textContent=`${i+1} / ${S.total}`;
  $("progbar").style.width=((i+1)/S.total*100)+"%";
}
async function save(flash=true){
  await fetch("/api/save",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({image_index:S.idx, detections:S.boxes.map(fromBox), status:"approved"})});
  S.dirty=false; updateUI();
  if(flash){ const t=$("savetxt"); t.textContent="saved ✓"; setTimeout(()=>t.textContent="saved",900); }
}

/* ---------- palette ---------- */
function buildPalette(){
  const p=$("palette"); p.innerHTML="";
  S.classes.forEach((nm,i)=>{
    const el=document.createElement("div"); el.className="cls"; el.dataset.i=i;
    el.innerHTML=`<span class="sw" style="background:${S.colors[i]}"></span>
      <span class="nm">${nm}</span><span class="k">${HOTKEYS[i]||""}</span><span class="ct" id="ct${i}">0</span>`;
    el.onclick=()=>{ if(S.sel>=0){ pushUndo(); S.boxes[S.sel].cls=i; S.dirty=true; } setActive(i); draw(); updateUI(); };
    p.appendChild(el);
  });
}
function setActive(i){ S.active=i; $("actSw").style.background=S.colors[i]; $("actNm").textContent=S.classes[i];
  document.querySelectorAll(".cls").forEach(e=>e.classList.toggle("sel",+e.dataset.i===i)); }
function updateUI(){
  const counts=new Array(S.classes.length).fill(0); S.boxes.forEach(b=>counts[b.cls]++);
  counts.forEach((c,i)=>{ const e=$("ct"+i); if(e){ e.textContent=c; e.classList.toggle("has",c>0);} });
  $("boxcount").textContent=S.boxes.length+" boxes";
  $("savedot").className="dot "+(S.dirty?"dirty":"saved"); $("savetxt").textContent=S.dirty?"unsaved":"saved";
  $("prevBtn").disabled=S.idx<=0; $("nextBtn").disabled=S.idx>=S.total-1;
  $("undoBtn").disabled=!S.undo.length; $("delBtn").disabled=S.sel<0;
  $("zoom").textContent=Math.round(S.zoom*100)+"%";
}

/* ---------- view ---------- */
function resize(){ const r=$("stage").getBoundingClientRect(), dpr=window.devicePixelRatio||1;
  cv.width=r.width*dpr; cv.height=r.height*dpr; cv.style.width=r.width+"px"; cv.style.height=r.height+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0); }
function fit(){ const r=$("stage").getBoundingClientRect();
  const s=Math.min(r.width/S.iw, r.height/S.ih)*0.96;
  S.scale=s; S.zoom=1; S.ox=(r.width-S.iw*s)/2; S.oy=(r.height-S.ih*s)/2; }
const sx=px=>px*S.scale+S.ox, sy=py=>py*S.scale+S.oy;        // image px -> screen
const ix=x=>(x-S.ox)/S.scale, iy=y=>(y-S.oy)/S.scale;        // screen -> image px

/* ---------- render ---------- */
function draw(){
  const r=$("stage").getBoundingClientRect(); ctx.clearRect(0,0,r.width,r.height);
  if(!S.img) return;
  ctx.drawImage(S.img, S.ox, S.oy, S.iw*S.scale, S.ih*S.scale);
  S.boxes.forEach((b,i)=>{
    const col=S.colors[b.cls]||"#4c8dff", cs=corners(b).map(p=>({x:sx(p.x),y:sy(p.y)})), seld=(i===S.sel);
    ctx.lineWidth=seld?2.5:1.5; ctx.strokeStyle=col; ctx.fillStyle=hexA(col,seld?0.18:0.10);
    ctx.beginPath(); ctx.moveTo(cs[0].x,cs[0].y); for(let k=1;k<4;k++) ctx.lineTo(cs[k].x,cs[k].y);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    const t=S.classes[b.cls]||b.cls; ctx.font="11px -apple-system,sans-serif";
    const tw=ctx.measureText(t).width+10;
    ctx.fillStyle=col; ctx.fillRect(cs[0].x-0.75, cs[0].y-15, tw, 15);
    ctx.fillStyle="#0a0c10"; ctx.fillText(t, cs[0].x+4, cs[0].y-4);
    if(seld){
      const rh=rotHandle(b), rhs={x:sx(rh.x),y:sy(rh.y)}, top={x:(cs[0].x+cs[1].x)/2,y:(cs[0].y+cs[1].y)/2};
      ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(top.x,top.y); ctx.lineTo(rhs.x,rhs.y); ctx.stroke();
      ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(rhs.x,rhs.y,5,0,7); ctx.fill(); ctx.stroke();
      cs.forEach(p=>{ ctx.fillStyle="#fff"; ctx.fillRect(p.x-4,p.y-4,8,8); ctx.strokeRect(p.x-4,p.y-4,8,8); });
    }
  });
  if(S.drag&&S.drag.mode==="draw"){ const a=S.drag;
    ctx.setLineDash([5,4]); ctx.lineWidth=1.5; ctx.strokeStyle=S.colors[S.active];
    ctx.strokeRect(sx(Math.min(a.x1,a.x2)),sy(Math.min(a.y1,a.y2)),
      Math.abs(a.x2-a.x1)*S.scale,Math.abs(a.y2-a.y1)*S.scale); ctx.setLineDash([]); }
}
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; }

/* ---------- hit testing ---------- */
function hitHandle(scrX,scrY){
  if(S.sel<0) return null; const b=S.boxes[S.sel];
  const rh=rotHandle(b); if(Math.hypot(scrX-sx(rh.x),scrY-sy(rh.y))<9) return {type:"rotate"};
  const cs=corners(b);
  for(let i=0;i<4;i++) if(Math.abs(scrX-sx(cs[i].x))<8&&Math.abs(scrY-sy(cs[i].y))<8) return {type:"corner",i};
  return null;
}
function topBoxAt(scrX,scrY){ const px=ix(scrX),py=iy(scrY);
  for(let i=S.boxes.length-1;i>=0;i--) if(inBox(px,py,S.boxes[i])) return i; return -1; }

/* ---------- interaction ---------- */
function pushUndo(){ S.undo.push(JSON.stringify(S.boxes)); if(S.undo.length>50) S.undo.shift(); }
function rel(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }

cv.addEventListener("mousedown",e=>{
  const m=rel(e);
  if(S.space||e.button===1){ S.drag={mode:"pan",mx:m.x,my:m.y,ox:S.ox,oy:S.oy}; return; }
  const hh=hitHandle(m.x,m.y);
  if(hh&&hh.type==="rotate"){ pushUndo(); S.drag={mode:"rotate"}; return; }
  if(hh&&hh.type==="corner"){ pushUndo(); const b=S.boxes[S.sel], cs=corners(b);
    S.drag={mode:"resize", fixed:cs[(hh.i+2)%4], angle:b.angle, cls:b.cls}; return; }
  const hit=topBoxAt(m.x,m.y);
  if(S.tool==="select"){
    if(hit>=0){ S.sel=hit; setActive(S.boxes[hit].cls); pushUndo();
      S.drag={mode:"move",mx:m.x,my:m.y,b:{...S.boxes[hit]}}; } else S.sel=-1;
    draw(); updateUI(); return;
  }
  S.drag={mode:"pending",mx:m.x,my:m.y,x1:ix(m.x),y1:iy(m.y),hit};
});
window.addEventListener("mousemove",e=>{
  const d=S.drag; if(!d) return; const m=rel(e);
  if(d.mode==="pan"){ S.ox=d.ox+(m.x-d.mx); S.oy=d.oy+(m.y-d.my); draw(); return; }
  if(d.mode==="pending"){ if(Math.hypot(m.x-d.mx,m.y-d.my)>4){ d.mode="draw"; } else return; }
  if(d.mode==="draw"){ d.x2=ix(m.x); d.y2=iy(m.y); draw(); return; }
  if(d.mode==="move"){ const dx=(m.x-d.mx)/S.scale, dy=(m.y-d.my)/S.scale, b=S.boxes[S.sel];
    b.cx=d.b.cx+dx; b.cy=d.b.cy+dy; S.dirty=true; draw(); return; }
  if(d.mode==="rotate"){ const b=S.boxes[S.sel];
    b.angle=Math.atan2(iy(m.y)-b.cy, ix(m.x)-b.cx)+Math.PI/2; S.dirty=true; draw(); return; }
  if(d.mode==="resize"){ const b=S.boxes[S.sel], px=ix(m.x), py=iy(m.y);
    const a=-d.angle, mL=rot(px,py,a), fL=rot(d.fixed.x,d.fixed.y,a);
    b.w=Math.max(Math.abs(mL.x-fL.x),1); b.h=Math.max(Math.abs(mL.y-fL.y),1);
    const cL={x:(mL.x+fL.x)/2,y:(mL.y+fL.y)/2}, cW=rot(cL.x,cL.y,d.angle);
    b.cx=cW.x; b.cy=cW.y; S.dirty=true; draw(); return; }
});
window.addEventListener("mouseup",()=>{
  const d=S.drag; S.drag=null; if(!d) return;
  if(d.mode==="pending"){ S.sel=d.hit; if(d.hit>=0) setActive(S.boxes[d.hit].cls); draw(); updateUI(); return; }
  if(d.mode==="draw"){
    const x1=Math.min(d.x1,d.x2),x2=Math.max(d.x1,d.x2),y1=Math.min(d.y1,d.y2),y2=Math.max(d.y1,d.y2);
    if((x2-x1)>3&&(y2-y1)>3){ pushUndo();
      S.boxes.push({cls:S.active, cx:(x1+x2)/2, cy:(y1+y2)/2, w:x2-x1, h:y2-y1, angle:0});
      S.sel=S.boxes.length-1; S.dirty=true; }
    draw(); updateUI(); return; }
  if(d.mode==="move"||d.mode==="resize"||d.mode==="rotate"){ draw(); updateUI(); }
});
cv.addEventListener("wheel",e=>{ e.preventDefault(); const m=rel(e), inx=ix(m.x),iny=iy(m.y),
  f=Math.exp(-e.deltaY*0.0015); S.scale*=f; S.zoom*=f; S.ox=m.x-inx*S.scale; S.oy=m.y-iny*S.scale;
  draw(); updateUI(); },{passive:false});

/* ---------- keys ---------- */
window.addEventListener("keydown",e=>{
  if(e.code==="Space"){ S.space=true; cv.style.cursor="grab"; e.preventDefault(); return; }
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="z"){ if(S.undo.length){ S.boxes=JSON.parse(S.undo.pop());
    S.sel=-1; S.dirty=true; draw(); updateUI(); } e.preventDefault(); return; }
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="s"){ save(); e.preventDefault(); return; }
  const k=e.key.toLowerCase();
  if(k==="arrowright"||k==="d"){ load(S.idx+1); return; }
  if(k==="arrowleft"||k==="a"){ load(S.idx-1); return; }
  if(k==="s"){ save(); return; }
  if(k==="f"){ fit(); draw(); updateUI(); return; }
  if(k==="b"){ setTool("draw"); return; }
  if(k==="v"){ setTool("select"); return; }
  if(k==="escape"){ S.sel=-1; draw(); updateUI(); return; }
  if(k==="delete"||k==="backspace"){ if(S.sel>=0){ pushUndo(); S.boxes.splice(S.sel,1); S.sel=-1;
    S.dirty=true; draw(); updateUI(); } e.preventDefault(); return; }
  const hi=HOTKEYS.indexOf(k);
  if(hi>=0&&hi<S.classes.length){ if(S.sel>=0){ pushUndo(); S.boxes[S.sel].cls=hi; S.dirty=true; }
    setActive(hi); draw(); updateUI(); }
});
window.addEventListener("keyup",e=>{ if(e.code==="Space"){ S.space=false; cv.style.cursor="crosshair"; } });
function setTool(t){ S.tool=t; $("toolDraw").classList.toggle("on",t==="draw");
  $("toolSelect").classList.toggle("on",t==="select"); cv.style.cursor=t==="draw"?"crosshair":"default"; }

$("prevBtn").onclick=()=>load(S.idx-1);
$("nextBtn").onclick=()=>load(S.idx+1);
$("saveBtn").onclick=()=>save();
$("fitBtn").onclick=()=>{ fit(); draw(); updateUI(); };
$("toolDraw").onclick=()=>setTool("draw");
$("toolSelect").onclick=()=>setTool("select");
$("undoBtn").onclick=()=>{ if(S.undo.length){ S.boxes=JSON.parse(S.undo.pop()); S.sel=-1; S.dirty=true; draw(); updateUI(); } };
$("delBtn").onclick=()=>{ if(S.sel>=0){ pushUndo(); S.boxes.splice(S.sel,1); S.sel=-1; S.dirty=true; draw(); updateUI(); } };
window.addEventListener("beforeunload",e=>{ if(S.dirty){ e.preventDefault(); e.returnValue=""; } });
$("hint").textContent="drag to draw • drag top handle to rotate • corners to resize • scroll zoom • space-drag pan";
init();
</script>
</body>
</html>
